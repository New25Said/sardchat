<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SayChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="whistle" src="whatsapp-assobio-oficial-2014-whistle.mp3"></audio>

    <div id="setup-screen" class="full-screen">
        <div class="setup-card">
            <h1>SayChat</h1>
            <div class="avatar-pick">
                <img id="setup-prev" src="perfil.png">
                <input type="file" id="file-in" hidden accept="image/*" onchange="loadImg(this)">
                <button onclick="document.getElementById('file-in').click()">Subir Foto</button>
            </div>
            <input type="text" id="setup-user" placeholder="@username único">
            <input type="text" id="setup-nick" placeholder="Nickname mostrado">
            <button class="btn-main" onclick="joinChat()">Entrar</button>
        </div>
    </div>

    <div id="app" style="display:none">
        <aside id="side">
            <header class="me-header">
                <img id="me-img" src="perfil.png" onclick="toggleEdit()">
                <div class="me-names" onclick="toggleEdit()">
                    <b id="me-nick"></b>
                    <small id="me-user"></small>
                </div>
            </header>
            
            <div id="edit-box" class="edit-box" style="display:none">
                <input type="text" id="new-nick" placeholder="Nuevo nickname">
                <button onclick="saveNewNick()">✓</button>
            </div>

            <div class="search">
                <input type="text" id="add-target" placeholder="Agregar @username...">
                <button onclick="reqAdd()">+</button>
            </div>

            <div id="list"></div>
        </aside>

        <main id="chat">
            <header id="chat-header">
                <h3 id="chat-title">Cargando...</h3>
            </header>
            <div id="msg-box"></div>
            <form id="msg-form">
                <input type="text" id="msg-in" placeholder="Escribe un mensaje..." autocomplete="off">
                <button type="submit">➤</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let my = { 
            u: localStorage.getItem('say_u'), 
            n: localStorage.getItem('say_n'), 
            a: localStorage.getItem('say_a') || 'perfil.png',
            contacts: JSON.parse(localStorage.getItem('say_c') || '{}')
        };
        let active = 'public';
        let unread = {};

        function loadImg(i) {
            const r = new FileReader();
            r.onload = e => document.getElementById('setup-prev').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        window.onload = () => { if(my.u) { joinChat(true); } else { document.getElementById('setup-screen').style.display='flex'; } };

        function joinChat(auto = false) {
            if(!auto) {
                my.u = document.getElementById('setup-user').value.toLowerCase().replace(/[^a-z0-9]/g,'');
                my.n = document.getElementById('setup-nick').value;
                my.a = document.getElementById('setup-prev').src;
                if(my.u.length < 3) return alert("User muy corto");
                localStorage.setItem('say_u', my.u);
                localStorage.setItem('say_n', my.n);
                localStorage.setItem('say_a', my.a);
            }
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('app').style.display='flex';
            document.getElementById('me-img').src = my.a;
            document.getElementById('me-nick').innerText = my.n;
            document.getElementById('me-user').innerText = '@'+my.u;
            
            socket.emit('register', { username: my.u, nickname: my.n, avatar: my.a });
            renderList();
            openChat('public');
        }

        function toggleEdit() { 
            const b = document.getElementById('edit-box');
            b.style.display = b.style.display==='none'?'flex':'none';
        }

        function saveNewNick() {
            const n = document.getElementById('new-nick').value;
            if(n) {
                my.n = n;
                localStorage.setItem('say_n', n);
                document.getElementById('me-nick').innerText = n;
                socket.emit('update_profile', { nickname: n, avatar: my.a });
                toggleEdit();
            }
        }

        function reqAdd() {
            const t = document.getElementById('add-target').value.toLowerCase().trim();
            if(t && t !== my.u) socket.emit('check_user', t);
            document.getElementById('add-target').value = '';
        }

        socket.on('user_exists', d => {
            my.contacts[d.username] = { nickname: d.nickname, avatar: d.avatar };
            localStorage.setItem('say_c', JSON.stringify(my.contacts));
            renderList();
        });

        function openChat(t) {
            active = t;
            unread[t] = 0;
            document.getElementById('chat-title').innerText = t === 'public' ? 'Chat Global' : `@${t}`;
            document.getElementById('msg-box').innerHTML = '';
            if(t === 'public') socket.emit('get_public');
            else socket.emit('get_private_history', t);
            renderList();
        }

        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            const i = document.getElementById('msg-in');
            if(!i.value) return;
            const data = { text: i.value, to: active, avatar: my.a, nickname: my.n };
            if(active === 'public') socket.emit('send_public', data);
            else {
                socket.emit('send_private', data);
                drawMsg({ from: my.u, text: i.value, time: 'visto' });
            }
            i.value = '';
        };

        socket.on('broadcast_public', d => { if(active === 'public') drawMsg(d); else markUnread('public'); });
        
        socket.on('private_message', d => {
            if(active === d.from) drawMsg(d);
            else { 
                markUnread(d.from); 
                document.getElementById('whistle').play(); 
            }
        });

        socket.on('load_private', d => { document.getElementById('msg-box').innerHTML = ''; d.history.forEach(drawMsg); });
        socket.on('load_public', h => { if(active==='public') { document.getElementById('msg-box').innerHTML=''; h.forEach(drawMsg); }});

        function drawMsg(d) {
            const box = document.getElementById('msg-box');
            const isMe = d.from === my.u;
            // IMPORTANTE: Obtenemos el perfil actual del mapa de usuarios o contactos
            const senderNick = isMe ? my.n : (my.contacts[d.from]?.nickname || d.nickname || d.from);
            const senderAvatar = isMe ? my.a : (my.contacts[d.from]?.avatar || d.avatar || 'perfil.png');

            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `
                ${!isMe ? `<img src="${senderAvatar}" class="msg-img">` : ''}
                <div class="bubble">
                    <small class="nick">${senderNick}</small>
                    <p>${d.text}</p>
                    <div class="msg-footer">
                        <span class="user-tag">@${d.from}</span>
                        <span class="time">${d.time || ''}</span>
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function markUnread(u) { unread[u] = (unread[u]||0)+1; renderList(); }

        function renderList() {
            const list = document.getElementById('list');
            list.innerHTML = `<div class="contact ${active==='public'?'active':''}" onclick="openChat('public')">
                <img src="perfil.png" class="a-img">
                <div class="c-info"><b>Chat Global</b></div>
                ${unread['public']?`<span class="badge">${unread['public']}</span>`:''}
            </div>`;
            Object.keys(my.contacts).forEach(u => {
                list.innerHTML += `<div class="contact ${active===u?'active':''}" onclick="openChat('${u}')">
                    <img src="${my.contacts[u].avatar}" class="a-img">
                    <div class="c-info"><b>${my.contacts[u].nickname}</b><br><small>@${u}</small></div>
                    ${unread[u]?`<span class="badge">${unread[u]}</span>`:''}
                </div>`;
            });
        }
    </script>
</body>
</html>
