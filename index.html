<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WineChat Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#ba68c8">WineChat</h2>
            <input type="text" id="nickname" placeholder="Nickname">
            <input type="file" id="photo-file" accept="image/*">
            <button onclick="join()">ENTRAR</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <div id="me-display" style="display:flex; align-items:center; gap:10px">
                <img id="my-avatar" style="width:35px; height:35px; border-radius:50%">
                <span id="my-nick"></span>
            </div>
            <button onclick="toggleProfile()" style="width:auto; padding:5px 10px">Ajustes</button>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button onclick="send()" style="width:50px; border-radius:50%">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let allUsers = {};
        let myData = JSON.parse(localStorage.getItem('wine_reg')) || null;

        function join() {
            const nick = document.getElementById('nickname').value;
            const file = document.getElementById('photo-file').files[0];
            if(!nick || (!myData && !file)) return alert("Datos incompletos");

            if(file) {
                const reader = new FileReader();
                reader.onload = () => {
                    myData = { nickname: nick, photo: reader.result };
                    saveAndEmit();
                };
                reader.readAsDataURL(file);
            } else {
                myData.nickname = nick;
                saveAndEmit();
            }
        }

        function saveAndEmit() {
            localStorage.setItem('wine_reg', JSON.stringify(myData));
            socket.emit('join', myData);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            updateHeader();
        }

        function updateHeader() {
            document.getElementById('my-nick').innerText = myData.nickname;
            document.getElementById('my-avatar').src = myData.photo;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                socket.emit('message', input.value);
                input.value = '';
            }
        }

        socket.on('init', (data) => {
            allUsers = data.users;
            data.history.forEach(renderMessage);
            if(myData) { 
                document.getElementById('nickname').value = myData.nickname;
                join(); 
            }
        });

        socket.on('user list update', (users) => {
            allUsers = users;
            // Al actualizar la lista de usuarios, re-renderizamos para que cambien nombres antiguos
            const msgs = document.getElementById('messages').querySelectorAll('.msg-container');
            msgs.forEach(m => {
                const uid = m.getAttribute('data-uid');
                if(uid && allUsers[uid]) {
                    m.querySelector('.u-name').innerText = allUsers[uid].nickname;
                    const img = m.querySelector('.avatar-chat');
                    if(img) img.src = allUsers[uid].photo;
                }
            });
        });

        socket.on('message', renderMessage);

        function renderMessage(data) {
            const msgBox = document.getElementById('messages');
            if(data.type === 'system') {
                msgBox.innerHTML += `<div class="system-msg">${data.text}</div>`;
            } else {
                const isMine = data.userId === socket.id;
                const user = allUsers[data.userId] || { nickname: 'Desconectado', photo: '' };
                const html = `
                    <div class="msg-container ${isMine?'mine':'others'}" data-uid="${data.userId}">
                        ${!isMine ? `<img src="${user.photo}" class="avatar-chat">`:''}
                        <div class="bubble">
                            <span class="u-name">${user.nickname}</span>
                            <span>${data.text}</span>
                        </div>
                    </div>`;
                msgBox.innerHTML += html;
            }
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function toggleProfile() {
            const newNick = prompt("Nuevo Nickname:", myData.nickname);
            if(newNick) {
                myData.nickname = newNick;
                localStorage.setItem('wine_reg', JSON.stringify(myData));
                socket.emit('update profile', myData);
                updateHeader();
            }
        }

        document.getElementById('msg-input').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
