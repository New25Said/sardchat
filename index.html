<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioChat 26</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-app">
        <aside id="sidebar">
            <header class="user-header">
                <img id="my-avatar-img" src="" class="avatar">
                <span id="my-name"></span>
            </header>
            
            <div class="tabs">
                <button onclick="showTab('public')" id="btn-public" class="active">Global</button>
                <button onclick="showTab('private')" id="btn-private">Privados</button>
            </div>

            <div id="contact-list">
                </div>
        </aside>

        <main id="chat-area">
            <header id="chat-header">
                <h3 id="current-chat-title">Chat Global</h3>
            </header>

            <div id="messages-container"></div>

            <form id="chat-form">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button type="submit">➤</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = localStorage.getItem('chat_user');
        let currentAvatar = localStorage.getItem('chat_avatar') || `https://api.dicebear.com/7.x/bottts/svg?seed=${Math.random()}`;
        let activeChat = 'public'; // 'public' o el nombre de un usuario
        let unread = {}; // Para las bolitas rojas
        let privateMessages = {}; // Guardar chats privados localmente {user: [msgs]}

        // Validación y Registro
        if (!currentUser) {
            currentUser = prompt("Nickname (solo minúsculas, sin espacios):").toLowerCase().replace(/\s+/g, '');
            localStorage.setItem('chat_user', currentUser);
            localStorage.setItem('chat_avatar', currentAvatar);
        }
        document.getElementById('my-name').innerText = currentUser;
        document.getElementById('my-avatar-img').src = currentAvatar;

        socket.emit('register', { user: currentUser, avatar: currentAvatar });

        // Navegación
        function showTab(type) {
            document.getElementById('btn-public').classList.toggle('active', type === 'public');
            document.getElementById('btn-private').classList.toggle('active', type === 'private');
            if (type === 'public') selectChat('public');
        }

        function selectChat(target) {
            activeChat = target;
            unread[target] = 0;
            document.getElementById('current-chat-title').innerText = target === 'public' ? 'Chat Global' : `Chat con ${target}`;
            renderMessages();
            updateContactList();
        }

        // Lógica de Mensajes
        const form = document.getElementById('chat-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = document.getElementById('msg-input').value;
            if (!text) return;

            const msgData = { from: currentUser, text: text, avatar: currentAvatar };

            if (activeChat === 'public') {
                socket.emit('send public', msgData);
            } else {
                if (!privateMessages[activeChat]) privateMessages[activeChat] = [];
                const localMsg = { ...msgData, time: 'Ahora', to: activeChat };
                privateMessages[activeChat].push(localMsg);
                socket.emit('send private', { to: activeChat, text: text, avatar: currentAvatar });
                renderMessages();
            }
            document.getElementById('msg-input').value = '';
        });

        socket.on('broadcast public', (data) => {
            if (!window.publicMsgs) window.publicMsgs = [];
            window.publicMsgs.push(data);
            if (activeChat !== 'public') unread['public'] = (unread['public'] || 0) + 1;
            if (activeChat === 'public') renderMessages();
            updateContactList();
        });

        socket.on('private message', (data) => {
            if (!privateMessages[data.from]) privateMessages[data.from] = [];
            privateMessages[data.from].push(data);
            
            if (activeChat !== data.from) {
                unread[data.from] = (unread[data.from] || 0) + 1;
                playNotification();
            }
            if (activeChat === data.from) renderMessages();
            updateContactList();
        });

        socket.on('update users', (users) => {
            window.onlineUsers = users;
            updateContactList();
        });

        function updateContactList() {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            
            // Opción Chat Global siempre arriba
            const pubDiv = createContactItem('Global', 'https://cdn-icons-png.flaticon.com/512/4433/4433449.png', 'public');
            list.appendChild(pubDiv);

            // Usuarios online
            Object.keys(window.onlineUsers || {}).forEach(user => {
                if (user !== currentUser) {
                    const div = createContactItem(user, window.onlineUsers[user].avatar, user);
                    list.appendChild(div);
                }
            });
        }

        function createContactItem(name, img, id) {
            const div = document.createElement('div');
            div.className = `contact-item ${activeChat === id ? 'active' : ''}`;
            div.onclick = () => selectChat(id);
            const count = unread[id] > 0 ? `<span class="badge">${unread[id]}</span>` : '';
            div.innerHTML = `<img src="${img}" class="avatar"> <span>${name}</span> ${count}`;
            return div;
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            const msgs = activeChat === 'public' ? (window.publicMsgs || []) : (privateMessages[activeChat] || []);
            
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg-row ${m.from === currentUser ? 'mine' : ''}`;
                div.innerHTML = `
                    <img src="${m.avatar}" class="msg-avatar">
                    <div class="msg-bubble">
                        <small>${m.from}</small>
                        <p>${m.text}</p>
                        <span class="time">${m.time || ''}</span>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function playNotification() {
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
            audio.play().catch(() => {});
            if (Notification.permission === "granted") {
                new Notification("Nuevo mensaje en BioChat");
            }
        }

        if (Notification.permission !== "denied") Notification.requestPermission();
    </script>
</body>
</html>
