<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SayChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="notif-sound" src="whatsapp-assobio-oficial-2014-whistle.mp3"></audio>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Configurar SayChat</h2>
            <div class="setup-avatar">
                <img id="prev-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Said" class="avatar-big">
                <input type="file" id="file-up" hidden accept="image/*" onchange="readImg(this)">
                <button class="btn-s" onclick="document.getElementById('file-up').click()">Cambiar Foto</button>
            </div>
            <input type="text" id="in-user" placeholder="@username (único)" maxlength="12">
            <input type="text" id="in-nick" placeholder="Tu nombre (nickname)" maxlength="20">
            <button class="btn-m" onclick="saveProfile()">Guardar Cambios</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <aside id="sidebar">
            <header class="top-bar">
                <img id="my-pic" src="" class="avatar-me" onclick="openEdit()">
                <div class="my-info" onclick="openEdit()">
                    <b id="my-nick-val"></b>
                    <span id="my-user-val"></span>
                </div>
            </header>

            <div class="search-bar">
                <div class="input-wrap">
                    <input type="text" id="add-in" placeholder="Agregar @username...">
                    <button onclick="addContact()">+</button>
                </div>
            </div>

            <div id="contacts"></div>
        </aside>

        <main id="chat">
            <header class="chat-header">
                <h3 id="chat-title">Chat Global</h3>
            </header>
            <div id="msgs"></div>
            <form id="form-msg">
                <input type="text" id="msg-in" placeholder="Escribe un mensaje..." autocomplete="off">
                <button type="submit">➤</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let my = { 
            user: localStorage.getItem('say_u'), 
            nick: localStorage.getItem('say_n'), 
            avatar: localStorage.getItem('say_a'),
            contacts: JSON.parse(localStorage.getItem('say_c') || '{}')
        };
        let active = 'public';
        let unread = {};

        window.onload = () => { if(!my.user) openEdit(true); else start(); };

        function readImg(input) {
            const r = new FileReader();
            r.onload = e => document.getElementById('prev-img').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }

        function openEdit(isNew = false) {
            document.getElementById('profile-modal').style.display = 'flex';
            if(!isNew) {
                document.getElementById('in-user').value = my.user;
                document.getElementById('in-user').disabled = true;
                document.getElementById('in-nick').value = my.nick;
                document.getElementById('prev-img').src = my.avatar;
            }
        }

        function saveProfile() {
            const u = document.getElementById('in-user').value.toLowerCase().trim();
            const n = document.getElementById('in-nick').value.trim();
            const a = document.getElementById('prev-img').src;
            if(u.length < 3 || n.length < 2) return alert("Datos inválidos");

            const isUpdate = !!my.user;
            my.user = u; my.nick = n; my.avatar = a;
            localStorage.setItem('say_u', u); localStorage.setItem('say_n', n); localStorage.setItem('say_a', a);
            
            document.getElementById('profile-modal').style.display = 'none';
            if(isUpdate) socket.emit('change profile', { nickname: n, avatar: a });
            else start();
        }

        function start() {
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('my-pic').src = my.avatar;
            document.getElementById('my-nick-val').innerText = my.nick;
            document.getElementById('my-user-val').innerText = '@'+my.user;
            socket.emit('register', { username: my.user, nickname: my.nick, avatar: my.avatar });
            updateList();
            selectChat('public');
        }

        function addContact() {
            const t = document.getElementById('add-in').value.toLowerCase().trim();
            if(t && t !== my.user) socket.emit('check user', t);
            document.getElementById('add-in').value = '';
        }

        socket.on('user exists', d => {
            my.contacts[d.username] = { nick: d.nickname, avatar: d.avatar };
            localStorage.setItem('say_c', JSON.stringify(my.contacts));
            updateList();
        });

        socket.on('profile updated', d => {
            if(my.contacts[d.username]) {
                my.contacts[d.username].nick = d.nickname;
                my.contacts[d.username].avatar = d.avatar;
                localStorage.setItem('say_c', JSON.stringify(my.contacts));
                updateList();
                if(active === d.username) selectChat(d.username);
            }
        });

        function selectChat(t) {
            active = t; unread[t] = 0;
            document.getElementById('chat-title').innerText = t === 'public' ? 'Chat Global' : '@'+t;
            document.getElementById('msgs').innerHTML = '';
            if(t === 'public') socket.emit('load public');
            else socket.emit('get private history', t);
            updateList();
        }

        document.getElementById('form-msg').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-in');
            if(!input.value) return;
            const data = { nickname: my.nick, text: input.value, avatar: my.avatar, to: active };
            
            if(active === 'public') socket.emit('send public', data);
            else {
                socket.emit('send private', data);
                renderMsg({ ...data, from: my.user, time: 'visto' }); // Insta-load
            }
            input.value = '';
        };

        socket.on('broadcast public', d => { if(active === 'public') renderMsg(d); else markUnread('public'); });
        socket.on('private message', d => {
            if(active === d.from) renderMsg(d);
            else { markUnread(d.from); document.getElementById('notif-sound').play(); }
        });

        socket.on('load private', d => { document.getElementById('msgs').innerHTML = ''; d.history.forEach(renderMsg); });
        socket.on('load public', h => { if(active==='public'){ document.getElementById('msgs').innerHTML = ''; h.forEach(renderMsg); }});

        function renderMsg(d) {
            const c = document.getElementById('msgs');
            const mine = d.from === my.user;
            const div = document.createElement('div');
            div.className = `row ${mine ? 'm' : 'o'}`;
            div.innerHTML = `
                ${!mine ? `<img src="${d.avatar}" class="a-chat">` : ''}
                <div class="bubble">
                    <b class="nick">${d.nickname}</b>
                    <p>${d.text}</p>
                    <div class="footer">
                        <small class="user">@${d.from}</small>
                        <span class="t">${d.time || ''}</span>
                    </div>
                </div>
            `;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function markUnread(u) { unread[u] = (unread[u] || 0) + 1; updateList(); }

        function updateList() {
            const l = document.getElementById('contacts');
            l.innerHTML = `<div class="item ${active==='public'?'act':''}" onclick="selectChat('public')">
                <img src="https://cdn-icons-png.flaticon.com/512/4433/4433449.png" class="a-list">
                <div class="i"><b>Chat Global</b></div>
                ${unread['public']?`<span class="b">${unread['public']}</span>`:''}
            </div>`;
            Object.keys(my.contacts).forEach(u => {
                l.innerHTML += `<div class="item ${active===u?'act':''}" onclick="selectChat('${u}')">
                    <img src="${my.contacts[u].avatar}" class="a-list">
                    <div class="i"><b>${my.contacts[u].nick}</b><br><small>@${u}</small></div>
                    ${unread[u]?`<span class="b">${unread[u]}</span>`:''}
                </div>`;
            });
        }
    </script>
</body>
</html>
