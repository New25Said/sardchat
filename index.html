<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WineChat Ultra</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0e11; color: #e9edef; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }

        /* Login y Modales */
        .overlay { position: fixed; inset: 0; background: #0b0e11; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: #1f2c33; padding: 30px; border-radius: 20px; border: 2px solid #7b1fa2; width: 90%; max-width: 350px; text-align: center; }
        
        .p-prev { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 15px auto; border: 3px solid #7b1fa2; display: block; cursor: pointer; background: #2a3942; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #2a3942; border: 1px solid #3b4a54; color: white; border-radius: 8px; outline: none; }
        button { background: #7b1fa2; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; }

        /* Chat Layout */
        header { 
            height: 120px; background: #1f2c33 url('baner.png') center/cover no-repeat;
            border-bottom: 2px solid #7b1fa2; flex-shrink: 0; display: flex; align-items: flex-end;
        }
        .h-info { width: 100%; padding: 10px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; justify-content: space-between; align-items: center; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: soft-light; background-color: #0b0e11; }
        
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .msg-container.mine { justify-content: flex-end; }
        .msg-container.others { justify-content: flex-start; }

        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .others .bubble { background: #1f2c33; border-bottom-left-radius: 0; }
        .mine .bubble { background: #4a148c; border-bottom-right-radius: 0; }

        .avatar-chat { width: 35px; height: 35px; border-radius: 50%; margin-right: 8px; object-fit: cover; border: 1px solid #7b1fa2; }
        .user-label { font-size: 0.75rem; font-weight: bold; color: #ba68c8; display: block; margin-bottom: 2px; }

        /* Comandos */
        .sys-msg { text-align: center; font-size: 0.75rem; color: #888; margin: 5px 0; }
        .aviso-msg { text-align: center; background: rgba(123, 31, 162, 0.2); border: 1px solid #7b1fa2; padding: 15px; border-radius: 12px; margin: 10px 0; backdrop-filter: blur(5px); }

        .input-area { background: #1f2c33; padding: 10px; display: flex; gap: 8px; flex-shrink: 0; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 12px; color: white; border-radius: 20px; outline: none; }
        #send-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="login-box">
            <h2 style="color: #ba68c8;">WineChat</h2>
            <img id="l-img" class="p-prev" src="https://via.placeholder.com/100?text=FOTO" onclick="document.getElementById('f-l').click()">
            <input type="file" id="f-l" class="hidden" accept="image/*" onchange="pv(this, 'l-img')">
            <input type="text" id="nickname" placeholder="Nickname">
            <button onclick="startChat()">INGRESAR</button>
        </div>
    </div>

    <div id="settings-screen" class="overlay hidden">
        <div class="login-box">
            <h3 style="color: #ba68c8;">Ajustes de Perfil</h3>
            <img id="s-img" class="p-prev" onclick="document.getElementById('f-s').click()">
            <input type="file" id="f-s" class="hidden" accept="image/*" onchange="pv(this, 's-img')">
            <input type="text" id="n-s" placeholder="Nuevo Nickname">
            <button onclick="saveSettings()">GUARDAR</button>
            <button onclick="tg()" style="background:#444; margin-top:8px">CERRAR</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <div class="h-info">
                <div style="display:flex; align-items:center; gap:10px">
                    <img id="h-a" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid #7b1fa2">
                    <span id="h-n" style="font-weight:bold; text-shadow: 1px 1px 2px black;"></span>
                </div>
                <button onclick="tg()" style="width: auto; padding: 5px 12px; font-size: 0.7rem;">PERFIL</button>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = JSON.parse(localStorage.getItem('winechat_user')) || null;
        let tempPhoto = "";

        // Vista previa
        function pv(input, target) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(target).src = e.target.result;
                tempPhoto = e.target.result;
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        window.onload = () => {
            if (myData) {
                tempPhoto = myData.photo;
                enterChat();
            }
        };

        function startChat() {
            const nick = document.getElementById('nickname').value.trim();
            if (nick && tempPhoto) {
                myData = { nickname: nick, photo: tempPhoto };
                localStorage.setItem('winechat_user', JSON.stringify(myData));
                enterChat();
            } else {
                alert("Necesitas Nickname y Foto.");
            }
        }

        function enterChat() {
            socket.emit('join', myData);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('h-n').innerText = myData.nickname;
            document.getElementById('h-a').src = myData.photo;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('message', input.value);
                input.value = '';
                input.focus();
            }
        }

        function tg() {
            const m = document.getElementById('settings-screen');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                document.getElementById('n-s').value = myData.nickname;
                document.getElementById('s-img').src = myData.photo;
                tempPhoto = myData.photo;
            }
        }

        function saveSettings() {
            const n = document.getElementById('n-s').value.trim();
            if(n) {
                myData = { nickname: n, photo: tempPhoto };
                localStorage.setItem('winechat_user', JSON.stringify(myData));
                location.reload(); // Recargamos para actualizar todo en el server
            }
        }

        socket.on('load history', (history) => {
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = '';
            history.forEach(data => renderMessage(data));
        });

        socket.on('message', (data) => renderMessage(data));

        function renderMessage(data) {
            const msgBox = document.getElementById('messages');
            if(data.type === 'sys') {
                msgBox.innerHTML += `<div class="sys-msg">${data.text}</div>`;
            } else if(data.type === 'aviso') {
                msgBox.innerHTML += `<div class="aviso-msg"><small style="color:#ba68c8; font-weight:bold">${data.user} AVISO:</small><br>${data.text}</div>`;
            } else {
                const isMine = data.user === myData.nickname;
                const div = document.createElement('div');
                div.className = `msg-container ${isMine ? 'mine' : 'others'}`;
                div.innerHTML = `
                    ${!isMine ? `<img src="${data.photo}" class="avatar-chat">` : ''}
                    <div class="bubble">
                        <span class="user-label">${isMine ? 'Tú' : data.user}</span>
                        <span>${data.text}</span>
                    </div>
                `;
                msgBox.appendChild(div);
            }
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
