<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SayChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2>SayChat</h2>
            <div class="setup-avatar">
                <img id="preview-img" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Said" class="avatar-large">
                <button onclick="document.getElementById('file-init').click()">Subir Foto</button>
                <input type="file" id="file-init" hidden accept="image/*" onchange="previewFile(this)">
            </div>
            <input type="text" id="username-init" placeholder="Tu usuario (ej: said26)" maxlength="15">
            <button id="start-btn" onclick="finishSetup()">Empezar</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <aside id="sidebar">
            <header class="user-header">
                <img id="my-avatar-img" src="" class="avatar">
                <span id="my-name"></span>
            </header>
            <div class="search-container">
                <input type="text" id="add-contact-input" placeholder="Agregar @user online...">
                <button onclick="addContact()">+</button>
            </div>
            <div id="contact-list"></div>
        </aside>

        <main id="chat-area">
            <header id="chat-header">
                <h3 id="current-chat-title">Chat Global</h3>
            </header>
            <div id="messages-container"></div>
            <form id="chat-form">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button type="submit">➤</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = localStorage.getItem('say_user');
        let currentAvatar = localStorage.getItem('say_avatar');
        let activeChat = 'public';
        let myContacts = JSON.parse(localStorage.getItem('say_contacts_v2') || '{}'); // {nick: avatar}
        let unread = {};

        window.onload = () => { if (!currentUser) document.getElementById('welcome-modal').style.display = 'flex'; else startApp(); };

        function previewFile(input) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('preview-img').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function finishSetup() {
            const name = document.getElementById('username-init').value.toLowerCase().trim().replace(/[^a-z0-9]/g, '');
            if (name.length < 3) return alert("Usuario inválido");
            currentUser = name;
            currentAvatar = document.getElementById('preview-img').src;
            localStorage.setItem('say_user', currentUser);
            localStorage.setItem('say_avatar', currentAvatar);
            document.getElementById('welcome-modal').style.display = 'none';
            startApp();
        }

        function startApp() {
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('my-name').innerText = currentUser;
            document.getElementById('my-avatar-img').src = currentAvatar;
            socket.emit('register', { user: currentUser, avatar: currentAvatar });
            selectChat('public');
        }

        // AGREGAR CONTACTO VALIDANDO QUE EXISTA
        function addContact() {
            const user = document.getElementById('add-contact-input').value.toLowerCase().trim();
            if (user && user !== currentUser) socket.emit('check user', user);
            document.getElementById('add-contact-input').value = '';
        }

        socket.on('user exists', (data) => {
            myContacts[data.user] = data.avatar;
            localStorage.setItem('say_contacts_v2', JSON.stringify(myContacts));
            updateContactList();
            alert(`@${data.user} agregado!`);
        });

        socket.on('user not found', (user) => alert(`El usuario @${user} no está conectado.`));

        function selectChat(target) {
            activeChat = target;
            unread[target] = 0;
            document.getElementById('current-chat-title').innerText = target === 'public' ? 'Chat Global' : `@${target}`;
            document.getElementById('messages-container').innerHTML = ''; // Limpiar para recargar
            
            if (target === 'public') socket.emit('load public');
            else socket.emit('get private history', target);
            updateContactList();
        }

        const form = document.getElementById('chat-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = document.getElementById('msg-input').value;
            if (!text) return;
            const payload = { from: currentUser, text, avatar: currentAvatar };

            if (activeChat === 'public') socket.emit('send public', payload);
            else {
                socket.emit('send private', { to: activeChat, text, avatar: currentAvatar });
                renderMessage({ ...payload, time: 'enviado' });
            }
            document.getElementById('msg-input').value = '';
        });

        socket.on('broadcast public', (data) => {
            if (activeChat === 'public') renderMessage(data);
            else { unread['public'] = (unread['public'] || 0) + 1; updateContactList(); }
        });

        socket.on('private message', (data) => {
            if (!myContacts[data.from]) {
                myContacts[data.from] = data.avatar;
                localStorage.setItem('say_contacts_v2', JSON.stringify(myContacts));
            }
            if (activeChat === data.from) renderMessage(data);
            else { unread[data.from] = (unread[data.from] || 0) + 1; updateContactList(); }
        });

        socket.on('load private', data => { 
            document.getElementById('messages-container').innerHTML = '';
            data.history.forEach(renderMessage); 
        });
        
        socket.on('load public', history => { 
            if(activeChat === 'public') {
                document.getElementById('messages-container').innerHTML = '';
                history.forEach(renderMessage); 
            }
        });

        function renderMessage(data) {
            const container = document.getElementById('messages-container');
            const isMine = data.from === currentUser;
            const div = document.createElement('div');
            div.className = `msg-row ${isMine ? 'mine' : ''}`;
            div.innerHTML = `
                ${!isMine ? `<img src="${data.avatar}" class="msg-avatar">` : ''}
                <div class="msg-bubble">
                    <small>${data.from}</small>
                    <p>${data.text}</p>
                    <span class="time">${data.time || ''}</span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function updateContactList() {
            const list = document.getElementById('contact-list');
            list.innerHTML = `
                <div class="contact-item ${activeChat === 'public' ? 'active' : ''}" onclick="selectChat('public')">
                    <img src="https://cdn-icons-png.flaticon.com/512/4433/4433449.png" class="avatar">
                    <div class="info"><span>Chat Global</span></div>
                    ${unread['public'] > 0 ? `<span class="badge">${unread['public']}</span>` : ''}
                </div>
            `;
            Object.keys(myContacts).forEach(c => {
                list.innerHTML += `
                    <div class="contact-item ${activeChat === c ? 'active' : ''}" onclick="selectChat('${c}')">
                        <img src="${myContacts[c]}" class="avatar">
                        <div class="info"><span>${c}</span></div>
                        ${unread[c] > 0 ? `<span class="badge">${unread[c]}</span>` : ''}
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
