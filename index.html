<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WineChat Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2 style="color:#ba68c8">WineChat</h2>
            <img id="preview-img" class="preview-circle" src="https://via.placeholder.com/90?text=?">
            <input type="text" id="nickname" placeholder="Tu nombre...">
            <input type="file" id="photo-file" accept="image/*" onchange="preview(this, 'preview-img')">
            <button onclick="join()">ENTRAR</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="box">
            <h3 style="color:#ba68c8">Ajustes</h3>
            <img id="edit-preview" class="preview-circle">
            <input type="text" id="edit-nickname">
            <input type="file" id="edit-photo" accept="image/*" onchange="preview(this, 'edit-preview')">
            <button onclick="saveSettings()">GUARDAR</button>
            <button class="secondary" onclick="toggleModal()">CANCELAR</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <img id="h-avatar" style="width:35px; height:35px; border-radius:50%; object-fit:cover">
                <span id="h-nick" style="font-weight:500"></span>
            </div>
            <button onclick="toggleModal()" style="width:auto; padding:5px 12px; font-size:0.75rem">PERFIL</button>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Mensaje..." autocomplete="off">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let allUsers = {};
        let myData = JSON.parse(localStorage.getItem('wine_user')) || null;
        let tempPhoto = "";

        function preview(input, target) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(target).src = e.target.result;
                tempPhoto = e.target.result;
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function join() {
            const nick = document.getElementById('nickname').value.trim();
            if(!nick || (!myData && !tempPhoto)) return alert("Nick y Foto obligatorios");
            
            myData = { nickname: nick, photo: tempPhoto || myData.photo };
            localStorage.setItem('wine_user', JSON.stringify(myData));
            
            socket.emit('join', myData);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('h-nick').innerText = myData.nickname;
            document.getElementById('h-avatar').src = myData.photo;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                socket.emit('message', input.value);
                input.value = '';
                input.focus();
            }
        }

        function toggleModal() {
            const m = document.getElementById('settings-modal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                document.getElementById('edit-nickname').value = myData.nickname;
                document.getElementById('edit-preview').src = myData.photo;
                tempPhoto = myData.photo;
            }
        }

        function saveSettings() {
            const n = document.getElementById('edit-nickname').value.trim();
            if(n) {
                myData = { nickname: n, photo: tempPhoto };
                localStorage.setItem('wine_user', JSON.stringify(myData));
                socket.emit('update profile', myData);
                document.getElementById('h-nick').innerText = n;
                document.getElementById('h-avatar').src = tempPhoto;
                toggleModal();
            }
        }

        socket.on('init', (data) => {
            allUsers = data.users;
            data.history.forEach(render);
            if(myData) {
                document.getElementById('nickname').value = myData.nickname;
                document.getElementById('preview-img').src = myData.photo;
                join();
            }
        });

        socket.on('user list update', (u) => {
            allUsers = u;
            document.querySelectorAll('.msg-container').forEach(m => {
                const id = m.getAttribute('data-uid');
                if(id && allUsers[id]) {
                    m.querySelector('.u-name').innerText = allUsers[id].nickname;
                    if(m.querySelector('.avatar-chat')) m.querySelector('.avatar-chat').src = allUsers[id].photo;
                }
            });
        });

        socket.on('message', render);

        function render(d) {
            const b = document.getElementById('messages');
            if(d.type === 'system') {
                b.innerHTML += `<div class="system-msg">${d.text}</div>`;
            } else {
                const mine = d.userId === socket.id;
                const user = allUsers[d.userId] || { nickname: 'User', photo: '' };
                const html = `
                    <div class="msg-container ${mine?'mine':'others'}" data-uid="${d.userId}">
                        ${!mine ? `<img src="${user.photo}" class="avatar-chat">` : ''}
                        <div class="bubble">
                            <span class="u-name">${user.nickname}</span>
                            <span>${d.text}</span>
                        </div>
                    </div>`;
                b.insertAdjacentHTML('beforeend', html);
            }
            b.scrollTop = b.scrollHeight;
        }

        document.getElementById('msg-input').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
