<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini WhatsApp</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
    <h3>Login / Registro</h3>
    <input id="user" placeholder="username">
    <input id="nick" placeholder="nickname">
    <input id="pass" type="password" placeholder="password">
    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
    <header><h3>Chat Global</h3></header>
    <div id="chat-box"></div>

    <form id="chat-form">
        <input id="msg" placeholder="mensaje">
        <button>➤</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let currentUser = null;

// 🧠 validación
const valid = u => /^[a-z0-9]+$/.test(u);

// 🟢 REGISTRO
function register(){
    const username = user.value.trim();
    const password = pass.value.trim();
    const nickname = nick.value.trim();

    if(!valid(username)) return alert("username inválido");

    socket.emit('register', { username, password, nickname });
}

socket.on('register success', () => alert("Registrado 🚀"));
socket.on('register error', e => alert(e));

// 🔵 LOGIN
function login(){
    const username = user.value.trim();
    const password = pass.value.trim();

    socket.emit('login', { username, password });
}

socket.on('login success', (data) => {
    currentUser = data.username;

    loginDiv.style.display = "none";
    app.style.display = "flex";
});

socket.on('login error', e => alert(e));

// 💬 CHAT
chatForm.onsubmit = e => {
    e.preventDefault();
    if(msg.value.trim()){
        socket.emit('send message', msg.value);
        msg.value="";
    }
};

socket.on('load history', (h)=>{
    chatBox.innerHTML="";
    h.forEach(addMsg);
});

socket.on('broadcast message', addMsg);

function addMsg(m){
    const d = document.createElement("div");
    d.innerHTML = `<b>${m.nickname}</b>: ${m.text} <small>${m.time}</small>`;
    chatBox.appendChild(d);
}

// refs
const loginDiv = document.getElementById('login');
const app = document.getElementById('app');
const user = document.getElementById('user');
const pass = document.getElementById('pass');
const nick = document.getElementById('nick');
const msg = document.getElementById('msg');
const chatBox = document.getElementById('chat-box');
const chatForm = document.getElementById('chat-form');

</script>
</body>
</html>
