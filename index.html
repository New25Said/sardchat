<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SayChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="notif-sound" src="whatsapp-assobio-oficial-2014-whistle.mp3" preload="auto"></audio>

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--p)">SayChat</h2>
            <div class="setup-avatar">
                <img id="preview-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Said" class="avatar-large">
                <button class="btn-subtle" onclick="document.getElementById('file-init').click()">Cambiar Foto</button>
                <input type="file" id="file-init" hidden accept="image/*" onchange="previewFile(this, 'preview-img')">
            </div>
            <input type="text" id="username-init" placeholder="@username (para agregarte)" maxlength="12">
            <input type="text" id="nickname-init" placeholder="Tu nombre público (nickname)" maxlength="20">
            <button class="btn-main" onclick="finishSetup()">Crear Cuenta</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <aside id="sidebar">
            <header class="user-profile-bar">
                <div class="profile-info" onclick="toggleEditProfile()">
                    <img id="my-avatar-img" src="" class="avatar clickable">
                    <div class="names">
                        <strong id="my-nickname-display"></strong>
                        <small id="my-username-display"></small>
                    </div>
                </div>
            </header>
            
            <div id="edit-profile" class="edit-panel" style="display:none">
                <input type="text" id="new-nickname" placeholder="Nuevo nickname">
                <button onclick="updateProfile()">Guardar</button>
            </div>

            <div class="search-box">
                <input type="text" id="add-contact-input" placeholder="Agregar @username...">
                <button onclick="addContact()">+</button>
            </div>

            <div id="contact-list"></div>
        </aside>

        <main id="chat-area">
            <header id="chat-header">
                <div class="header-info">
                    <h3 id="current-chat-title">Chat Global</h3>
                </div>
            </header>
            <div id="messages-container"></div>
            <form id="chat-form">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button type="submit">➤</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const state = {
            user: localStorage.getItem('s_user'),
            nick: localStorage.getItem('s_nick'),
            avatar: localStorage.getItem('s_avatar'),
            active: 'public',
            contacts: JSON.parse(localStorage.getItem('s_contacts') || '{}'),
            unread: {}
        };

        window.onload = () => {
            if (!state.user) document.getElementById('welcome-modal').style.display = 'flex';
            else startApp();
        };

        function previewFile(input, targetId) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById(targetId).src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function finishSetup() {
            const u = document.getElementById('username-init').value.toLowerCase().trim();
            const n = document.getElementById('nickname-init').value.trim();
            const a = document.getElementById('preview-img').src;
            if (u.length < 3 || n.length < 2) return alert("Completa los datos correctamente");
            
            state.user = u; state.nick = n; state.avatar = a;
            localStorage.setItem('s_user', u); localStorage.setItem('s_nick', n); localStorage.setItem('s_avatar', a);
            document.getElementById('welcome-modal').style.display = 'none';
            startApp();
        }

        function startApp() {
            document.getElementById('main-app').style.display = 'flex';
            updateUIProfile();
            socket.emit('register', { username: state.user, nickname: state.nick, avatar: state.avatar });
            selectChat('public');
        }

        function updateUIProfile() {
            document.getElementById('my-nickname-display').innerText = state.nick;
            document.getElementById('my-username-display').innerText = '@' + state.user;
            document.getElementById('my-avatar-img').src = state.avatar;
        }

        function toggleEditProfile() {
            const p = document.getElementById('edit-profile');
            p.style.display = p.style.display === 'none' ? 'flex' : 'none';
        }

        function updateProfile() {
            const newNick = document.getElementById('new-nickname').value.trim();
            if (newNick) {
                state.nick = newNick;
                localStorage.setItem('s_nick', newNick);
                updateUIProfile();
                socket.emit('update profile', { nickname: state.nick, avatar: state.avatar });
                toggleEditProfile();
            }
        }

        function addContact() {
            const target = document.getElementById('add-contact-input').value.toLowerCase().trim();
            if (target && target !== state.user) socket.emit('check user', target);
            document.getElementById('add-contact-input').value = '';
        }

        socket.on('user exists', data => {
            state.contacts[data.username] = { nick: data.nickname, avatar: data.avatar };
            localStorage.setItem('s_contacts', JSON.stringify(state.contacts));
            updateContactList();
        });

        function selectChat(target) {
            state.active = target;
            state.unread[target] = 0;
            document.getElementById('current-chat-title').innerText = target === 'public' ? 'Chat Global' : `@${target}`;
            document.getElementById('messages-container').innerHTML = '';
            if (target === 'public') socket.emit('load public');
            else socket.emit('get private history', target);
            updateContactList();
        }

        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if (!input.value) return;

            const msg = { from: state.user, nickname: state.nick, text: input.value, avatar: state.avatar };
            if (state.active === 'public') socket.emit('send public', msg);
            else {
                socket.emit('send private', { to: state.active, ...msg });
                renderMessage({ ...msg, time: 'visto' }); // Insta-render
            }
            input.value = '';
        };

        socket.on('broadcast public', data => {
            if (state.active === 'public') renderMessage(data);
            else updateUnread('public');
        });

        socket.on('private message', data => {
            if (!state.contacts[data.from]) {
                state.contacts[data.from] = { nick: data.nickname, avatar: data.avatar };
                localStorage.setItem('s_contacts', JSON.stringify(state.contacts));
            }
            if (state.active === data.from) renderMessage(data);
            else {
                updateUnread(data.from);
                document.getElementById('notif-sound').play();
            }
        });

        socket.on('load private', d => d.history.forEach(renderMessage));
        socket.on('load public', h => h.forEach(renderMessage));

        function renderMessage(d) {
            const c = document.getElementById('messages-container');
            const mine = d.from === state.user;
            const div = document.createElement('div');
            div.className = `msg-row ${mine ? 'mine' : ''}`;
            div.innerHTML = `
                ${!mine ? `<img src="${d.avatar}" class="msg-avatar">` : ''}
                <div class="msg-bubble">
                    ${!mine ? `<small>${d.nickname}</small>` : ''}
                    <p>${d.text}</p>
                    <span class="time">${d.time || ''}</span>
                </div>
            `;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function updateUnread(u) { state.unread[u] = (state.unread[u] || 0) + 1; updateContactList(); }

        function updateContactList() {
            const l = document.getElementById('contact-list');
            l.innerHTML = `<div class="contact-item ${state.active==='public'?'active':''}" onclick="selectChat('public')">
                <img src="https://cdn-icons-png.flaticon.com/512/4433/4433449.png" class="avatar">
                <div class="info"><strong>Chat Global</strong></div>
                ${state.unread['public']?`<span class="badge">${state.unread['public']}</span>`:''}
            </div>`;
            Object.keys(state.contacts).forEach(u => {
                l.innerHTML += `<div class="contact-item ${state.active===u?'active':''}" onclick="selectChat('${u}')">
                    <img src="${state.contacts[u].avatar}" class="avatar">
                    <div class="info"><strong>${state.contacts[u].nick}</strong><br><small>@${u}</small></div>
                    ${state.unread[u]?`<span class="badge">${state.unread[u]}</span>`:''}
                </div>`;
            });
        }
    </script>
</body>
</html>
