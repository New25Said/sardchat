<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WineChat Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#ba68c8; margin-bottom:15px;">WineChat</h2>
            <img id="preview-img" src="https://via.placeholder.com/80?text=+" alt="Preview">
            <input type="text" id="nickname" placeholder="Nickname">
            <input type="file" id="photo-file" accept="image/*" onchange="previewPhoto(this, 'preview-img')">
            <button onclick="join()">INGRESAR AL CHAT</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h3 style="color:#ba68c8; margin-bottom:15px;">Ajustes de Perfil</h3>
            <img id="edit-preview" style="width:70px; height:70px; border-radius:50%; display:block; margin:0 auto 10px; border:2px solid #7b1fa2">
            <input type="text" id="edit-nickname" placeholder="Nuevo Nick">
            <input type="file" id="edit-photo" accept="image/*" onchange="previewPhoto(this, 'edit-preview')">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="saveSettings()">Guardar</button>
                <button onclick="toggleModal()" style="background:#444">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <img id="my-avatar" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <span id="my-nick" style="font-weight:bold;"></span>
            </div>
            <button onclick="toggleModal()" style="width:auto; padding:5px 15px; font-size:0.8rem;">AJUSTES</button>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let allUsers = {};
        let myData = JSON.parse(localStorage.getItem('wine_reg')) || null;
        let tempPhoto = "";

        // Vista previa de imagen
        function previewPhoto(input, targetId) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(targetId).src = e.target.result;
                tempPhoto = e.target.result;
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function join() {
            const nick = document.getElementById('nickname').value;
            if(!nick || (!myData && !tempPhoto)) return alert("Pon tu nick y tu foto");
            
            myData = { nickname: nick, photo: tempPhoto || myData.photo };
            localStorage.setItem('wine_reg', JSON.stringify(myData));
            
            socket.emit('join', myData);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            updateHeader();
        }

        function updateHeader() {
            document.getElementById('my-nick').innerText = myData.nickname;
            document.getElementById('my-avatar').src = myData.photo;
        }

        function toggleModal() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                document.getElementById('edit-nickname').value = myData.nickname;
                document.getElementById('edit-preview').src = myData.photo;
                tempPhoto = myData.photo;
            }
        }

        function saveSettings() {
            const newNick = document.getElementById('edit-nickname').value;
            if(newNick) {
                myData = { nickname: newNick, photo: tempPhoto };
                localStorage.setItem('wine_reg', JSON.stringify(myData));
                socket.emit('update profile', myData);
                updateHeader();
                toggleModal();
            }
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                socket.emit('message', input.value);
                input.value = '';
            }
        }

        socket.on('init', (data) => {
            allUsers = data.users;
            data.history.forEach(renderMessage);
            if(myData) { 
                tempPhoto = myData.photo;
                document.getElementById('nickname').value = myData.nickname;
                document.getElementById('preview-img').src = myData.photo;
                join(); 
            }
        });

        socket.on('user list update', (users) => {
            allUsers = users;
            const msgs = document.getElementById('messages').querySelectorAll('.msg-container');
            msgs.forEach(m => {
                const uid = m.getAttribute('data-uid');
                if(uid && allUsers[uid]) {
                    m.querySelector('.u-name').innerText = allUsers[uid].nickname;
                    const img = m.querySelector('.avatar-chat');
                    if(img) img.src = allUsers[uid].photo;
                }
            });
        });

        socket.on('message', renderMessage);

        function renderMessage(data) {
            const msgBox = document.getElementById('messages');
            if(data.type === 'system') {
                msgBox.innerHTML += `<div class="system-msg">${data.text}</div>`;
            } else {
                const isMine = data.userId === socket.id;
                const user = allUsers[data.userId] || { nickname: 'Ex-Usuario', photo: '' };
                const html = `
                    <div class="msg-container ${isMine?'mine':'others'}" data-uid="${data.userId}">
                        ${!isMine ? `<img src="${user.photo}" class="avatar-chat">`:''}
                        <div class="bubble">
                            <span class="u-name">${user.nickname}</span>
                            <span>${data.text}</span>
                        </div>
                    </div>`;
                msgBox.insertAdjacentHTML('beforeend', html);
            }
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        document.getElementById('msg-input').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
