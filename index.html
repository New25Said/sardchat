<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SayChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="whistle" src="whatsapp-assobio-oficial-2014-whistle.mp3"></audio>

    <div id="login" class="screen">
        <div class="card">
            <h1>SayChat</h1>
            <img id="p-prev" src="perfil.png" class="big-a" onclick="document.getElementById('f').click()">
            <input type="file" id="f" hidden onchange="img(this)">
            <input type="text" id="u" placeholder="@username">
            <input type="text" id="n" placeholder="Nickname">
            <button onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="app" style="display:none">
        <aside>
            <div class="me">
                <img id="m-img" src="perfil.png">
                <div><b id="m-nick"></b><br><small id="m-user"></small></div>
            </div>
            <div class="add">
                <input type="text" id="target" placeholder="@username...">
                <button onclick="add()">+</button>
            </div>
            <div id="list"></div>
        </aside>

        <main>
            <header><h3 id="chat-t">Global</h3></header>
            <div id="msgs"></div>
            <form id="send">
                <input type="text" id="in" placeholder="Mensaje..." autocomplete="off">
                <button>➤</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let my = { u: localStorage.getItem('u'), n: localStorage.getItem('n'), a: localStorage.getItem('a') || 'perfil.png' };
        let active = 'Global';
        let db = { 'Global': [] }; // AQUÍ SE GUARDAN LOS MENSAJES REALMENTE
        let contacts = JSON.parse(localStorage.getItem('contacts') || '{}');

        function img(i) {
            const r = new FileReader();
            r.onload = e => { document.getElementById('p-prev').src = e.target.result; my.a = e.target.result; };
            r.readAsDataURL(i.files[0]);
        }

        function entrar() {
            my.u = document.getElementById('u').value.toLowerCase().trim();
            my.n = document.getElementById('n').value.trim();
            if(!my.u || !my.n) return;
            localStorage.setItem('u', my.u); localStorage.setItem('n', my.n); localStorage.setItem('a', my.a);
            location.reload();
        }

        if(my.u) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('m-img').src = my.a;
            document.getElementById('m-nick').innerText = my.n;
            document.getElementById('m-user').innerText = '@'+my.u;
            socket.emit('register', { user: my.u, nick: my.n, avatar: my.a });
        }

        function add() {
            const t = document.getElementById('target').value.toLowerCase().trim();
            if(t && t !== my.u) {
                contacts[t] = { nick: t, a: 'perfil.png' };
                if(!db[t]) db[t] = [];
                save(); renderList();
            }
        }

        function save() { localStorage.setItem('contacts', JSON.stringify(contacts)); }

        function openChat(t) {
            active = t;
            document.getElementById('chat-t').innerText = t === 'Global' ? 'Global' : '@'+t;
            renderMsgs();
        }

        document.getElementById('send').onsubmit = e => {
            e.preventDefault();
            const val = document.getElementById('in').value;
            if(!val) return;
            const m = { from: my.u, nick: my.n, text: val, avatar: my.a, time: 'visto' };
            
            if(active === 'Global') socket.emit('send_public', m);
            else {
                db[active].push(m);
                socket.emit('send_private', { to: active, text: val, nick: my.n, avatar: my.a });
                renderMsgs();
            }
            document.getElementById('in').value = '';
        };

        socket.on('rcv_public', m => { db['Global'].push(m); if(active === 'Global') renderMsgs(); });
        
        socket.on('rcv_private', m => {
            if(!db[m.from]) db[m.from] = [];
            db[m.from].push(m);
            if(!contacts[m.from]) { contacts[m.from] = { nick: m.nick, a: m.avatar }; save(); renderList(); }
            if(active === m.from) renderMsgs();
            else document.getElementById('whistle').play();
        });

        function renderMsgs() {
            const box = document.getElementById('msgs');
            box.innerHTML = '';
            (db[active] || []).forEach(m => {
                const mine = m.from === my.u;
                const d = document.createElement('div');
                d.className = `row ${mine ? 'me' : 'ot'}`;
                d.innerHTML = `
                    <div class="bub">
                        <small>${m.nick}</small>
                        <p>${m.text}</p>
                        <span>${m.time}</span>
                    </div>
                `;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        function renderList() {
            const l = document.getElementById('list');
            l.innerHTML = `<div class="con" onclick="openChat('Global')"><b>Chat Global</b></div>`;
            Object.keys(contacts).forEach(c => {
                l.innerHTML += `<div class="con" onclick="openChat('${c}')"><b>${contacts[c].nick}</b><br><small>@${c}</small></div>`;
            });
        }
        renderList();
    </script>
</body>
</html>
