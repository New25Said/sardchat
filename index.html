<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WineChat Persistent</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0e11; color: #e9edef; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* Pantalla Login */
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e11; }
        .login-box { background: #1f2c33; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; border: 1px solid #7b1fa2; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a3942; border: 1px solid #3b4a54; color: white; border-radius: 8px; outline: none; }
        button { background: #7b1fa2; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; }

        /* Chat */
        #chat-screen { display: flex; flex-direction: column; height: 100vh; width: 100vw; background-color: #0b0e11; }
        header { background: #1f2c33; padding: 15px; border-bottom: 1px solid #4a148c; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: soft-light; }
        
        .msg-container { display: flex; width: 100%; }
        .msg-container.mine { justify-content: flex-end; }
        .msg-container.others { justify-content: flex-start; }

        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .others .bubble { background: #1f2c33; border-top-left-radius: 0; }
        .mine .bubble { background: #4a148c; border-top-right-radius: 0; }

        .avatar-chat { width: 35px; height: 35px; border-radius: 50%; margin-right: 8px; object-fit: cover; }
        .user-label { font-size: 0.75rem; font-weight: bold; color: #ba68c8; display: block; margin-bottom: 2px; }

        .input-area { background: #1f2c33; padding: 10px; display: flex; gap: 8px; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 12px; color: white; border-radius: 20px; }
        #send-btn { width: 50px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #ba68c8;">WineChat</h2>
            <input type="text" id="nickname" placeholder="Nickname">
            <p style="color: #888; font-size: 0.8rem; margin: 10px 0;">Sube tu foto una vez:</p>
            <input type="file" id="photo-file" accept="image/*">
            <button onclick="startChat()">INGRESAR</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <span id="display-name">Chat Global</span>
            <button onclick="logout()" style="width: auto; padding: 5px 10px; font-size: 0.7rem;">Cambiar Perfil</button>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = JSON.parse(localStorage.getItem('winechat_user')) || null;

        // Si ya existen datos, entrar directo
        window.onload = () => {
            if (myData) {
                enterChat();
            }
        };

        document.getElementById('photo-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() { 
                const nick = document.getElementById('nickname').value;
                if(nick) {
                    myData = { nickname: nick, photo: reader.result };
                    localStorage.setItem('winechat_user', JSON.stringify(myData));
                }
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function startChat() {
            const nick = document.getElementById('nickname').value;
            if (nick && myData) {
                myData.nickname = nick; // Por si cambió el nick pero no la foto
                localStorage.setItem('winechat_user', JSON.stringify(myData));
                enterChat();
            } else {
                alert("Necesitas Nickname y Foto.");
            }
        }

        function enterChat() {
            socket.emit('join', myData);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = "Hola, " + myData.nickname;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('message', input.value);
                input.value = '';
            }
        }

        // Cargar historial completo al entrar
        socket.on('load history', (history) => {
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = ''; // Limpiar por si acaso
            history.forEach(data => renderMessage(data));
        });

        socket.on('message', (data) => renderMessage(data));

        function renderMessage(data) {
            const isMine = data.user === myData.nickname;
            const container = document.createElement('div');
            container.className = `msg-container ${isMine ? 'mine' : 'others'}`;
            container.innerHTML = `
                ${!isMine ? `<img src="${data.photo}" class="avatar-chat">` : ''}
                <div class="bubble">
                    <span class="user-label">${isMine ? 'Tú' : data.user}</span>
                    <span>${data.text}</span>
                </div>
            `;
            const msgBox = document.getElementById('messages');
            msgBox.appendChild(container);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function logout() {
            localStorage.removeItem('winechat_user');
            location.reload();
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
