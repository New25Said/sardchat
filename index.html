<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WineChat Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2>Bienvenido</h2>
            <img id="preview-img" class="clickable-avatar" src="https://via.placeholder.com/110?text=Foto" onclick="document.getElementById('photo-file').click()">
            <input type="file" id="photo-file" class="hidden" accept="image/*" onchange="preview(this, 'preview-img')">
            <input type="text" id="nickname" placeholder="Tu Apodo...">
            <button onclick="join()">ENTRAR AL CHAT</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="box">
            <h3>Mi Perfil</h3>
            <img id="edit-preview" class="clickable-avatar" onclick="document.getElementById('edit-photo').click()">
            <input type="file" id="edit-photo" class="hidden" accept="image/*" onchange="preview(this, 'edit-preview')">
            <input type="text" id="edit-nickname">
            <button onclick="saveSettings()">GUARDAR CAMBIOS</button>
            <button onclick="toggleModal()" style="background:#3b4a54; margin-top:8px">CERRAR</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="server-banner"></div>
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <img id="h-avatar" style="width:35px; height:35px; border-radius:50%; object-fit:cover">
                <span id="h-nick" style="font-weight:bold; color:#ba68c8"></span>
            </div>
            <button onclick="toggleModal()" style="width:auto; padding:5px 15px; font-size:0.8rem">AJUSTES</button>
        </header>
        
        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = JSON.parse(localStorage.getItem('wine_user')) || null;
        let allUsers = {};
        let tempPhoto = "";

        function preview(input, target) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(target).src = e.target.result;
                tempPhoto = e.target.result;
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function join() {
            const nick = document.getElementById('nickname').value.trim();
            if(!nick || (!myData && !tempPhoto)) return alert("Pon nombre y foto, weón");
            myData = { nickname: nick, photo: tempPhoto || myData.photo };
            localStorage.setItem('wine_user', JSON.stringify(myData));
            socket.emit('join', myData);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            document.getElementById('h-nick').innerText = myData.nickname;
            document.getElementById('h-avatar').src = myData.photo;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                socket.emit('message', input.value);
                input.value = '';
                input.focus();
            }
        }

        function toggleModal() {
            const m = document.getElementById('settings-modal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                document.getElementById('edit-nickname').value = myData.nickname;
                document.getElementById('edit-preview').src = myData.photo;
                tempPhoto = myData.photo;
            }
        }

        function saveSettings() {
            const n = document.getElementById('edit-nickname').value.trim();
            if(n) {
                myData = { nickname: n, photo: tempPhoto };
                localStorage.setItem('wine_user', JSON.stringify(myData));
                socket.emit('update profile', myData);
                updateUI();
                toggleModal();
            }
        }

        socket.on('init', (data) => {
            allUsers = data.users;
            data.history.forEach(render);
            if(myData) {
                document.getElementById('nickname').value = myData.nickname;
                document.getElementById('preview-img').src = myData.photo;
                tempPhoto = myData.photo;
                join();
            }
        });

        socket.on('user list update', (u) => {
            allUsers = u;
            // Actualizar mensajes antiguos en pantalla al instante
            document.querySelectorAll('.msg-container').forEach(container => {
                const uid = container.getAttribute('data-uid');
                if(uid && allUsers[uid]) {
                    const img = container.querySelector('.avatar-chat');
                    const nick = container.querySelector('.u-name');
                    if(img) img.src = allUsers[uid].photo;
                    if(nick && nick.innerText !== 'Tú') nick.innerText = allUsers[uid].nickname;
                }
            });
        });

        socket.on('message', render);

        function render(d) {
            const b = document.getElementById('messages');
            let html = "";
            if(d.type === 'system') {
                html = `<div class="system-msg">${d.text}</div>`;
            } else if(d.type === 'aviso') {
                html = `<div class="aviso-msg" data-uid="${d.userId}"><span class="aviso-tag">${d.userNick} AVISO:</span>${d.text}</div>`;
            } else {
                const mine = d.userId === socket.id;
                const photo = allUsers[d.userId] ? allUsers[d.userId].photo : d.userPhoto;
                const nick = allUsers[d.userId] ? allUsers[d.userId].nickname : d.userNick;
                
                html = `
                    <div class="msg-container ${mine?'mine':'others'}" data-uid="${d.userId}">
                        ${!mine ? `<img src="${photo}" class="avatar-chat">` : ''}
                        <div class="bubble">
                            <span class="u-name">${mine ? 'Tú' : nick}</span>
                            <span>${d.text}</span>
                        </div>
                    </div>`;
            }
            b.insertAdjacentHTML('beforeend', html);
            b.scrollTop = b.scrollHeight;
        }

        document.getElementById('msg-input').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
