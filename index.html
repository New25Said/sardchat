<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WineChat Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2 style="color:#ba68c8">Registro</h2>
            <img id="p-img" class="clickable-avatar" src="https://via.placeholder.com/100?text=+" onclick="document.getElementById('f-input').click()">
            <input type="file" id="f-input" class="hidden" accept="image/*" onchange="preview(this, 'p-img')">
            <input type="text" id="p-nick" placeholder="Apodo...">
            <button onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="box">
            <h3>Perfil</h3>
            <img id="e-img" class="clickable-avatar" onclick="document.getElementById('e-input').click()">
            <input type="file" id="e-input" class="hidden" accept="image/*" onchange="preview(this, 'e-img')">
            <input type="text" id="e-nick">
            <button onclick="update()">GUARDAR</button>
            <button onclick="toggleModal()" style="margin-top:8px; background:#444">CANCELAR</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="banner"></div>
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <img id="my-p" style="width:35px; height:35px; border-radius:50%; object-fit:cover">
                <span id="my-n"></span>
            </div>
            <button onclick="toggleModal()" style="width:auto; padding:5px 15px">PERFIL</button>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Mensaje..." autocomplete="off">
            <button class="btn-send" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let user = JSON.parse(localStorage.getItem('wine_user')) || null;
        let currentPhoto = "";

        function preview(input, id) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById(id).src = e.target.result;
                currentPhoto = e.target.result;
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function entrar() {
            const nick = document.getElementById('p-nick').value;
            if(!nick || (!user && !currentPhoto)) return alert("Datos faltantes");
            user = { nickname: nick, photo: currentPhoto || user.photo };
            localStorage.setItem('wine_user', JSON.stringify(user));
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('my-p').src = user.photo;
            document.getElementById('my-n').innerText = user.nickname;
        }

        function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(val) {
                let type = 'user';
                let text = val;
                if(val.startsWith('/sys ')) { type = 'sys'; text = val.replace('/sys ', ''); }
                if(val.startsWith('/aviso ')) { type = 'aviso'; text = val.replace('/aviso ', ''); }
                
                socket.emit('message', {
                    nick: user.nickname,
                    photo: user.photo,
                    text: text,
                    type: type,
                    id: socket.id
                });
                input.value = '';
                input.focus();
            }
        }

        function toggleModal() {
            const m = document.getElementById('settings-modal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                document.getElementById('e-nick').value = user.nickname;
                document.getElementById('e-img').src = user.photo;
                currentPhoto = user.photo;
            }
        }

        function update() {
            const n = document.getElementById('e-nick').value;
            if(n) {
                user = { nickname: n, photo: currentPhoto };
                localStorage.setItem('wine_user', JSON.stringify(user));
                document.getElementById('my-p').src = user.photo;
                document.getElementById('my-n').innerText = user.nickname;
                toggleModal();
            }
        }

        socket.on('load history', (history) => {
            history.forEach(render);
            if(user) entrar();
        });

        socket.on('new message', render);

        function render(data) {
            const b = document.getElementById('messages');
            let html = "";
            if(data.type === 'sys') {
                html = `<div class="sys-msg">${data.text}</div>`;
            } else if(data.type === 'aviso') {
                html = `<div class="aviso-box"><small style="color:#ba68c8">AVISO DE ${data.nick}:</small><br>${data.text}</div>`;
            } else {
                const mine = data.id === socket.id;
                html = `
                    <div class="msg-container ${mine?'mine':'others'}">
                        ${!mine ? `<img src="${data.photo}" class="avatar-chat">` : ''}
                        <div class="bubble">
                            <span class="u-name">${mine ? 'Tú' : data.nick}</span>
                            <span>${data.text}</span>
                        </div>
                    </div>`;
            }
            b.insertAdjacentHTML('beforeend', html);
            b.scrollTop = b.scrollHeight;
        }

        document.getElementById('msg-input').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
