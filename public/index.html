<!DOCTYPE html>
<html>
<head>
  <title>Say Chat 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h1>Say Chat 2</h1>
  <input id="user" placeholder="username (a-z 0-9)">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>Chats</h2>
    <div style="padding:10px;">🌍 Global</div>
  </div>

  <!-- CHAT -->
  <div id="chatArea">

    <div id="header">
      💬 Global Chat
    </div>

    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Mensaje">
      <button onclick="enviar()">➤</button>
    </div>

  </div>

</div>
