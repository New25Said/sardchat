<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VinoChat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1a0008;
  color: white;
}

#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#chat {
  display: none;
  height: 100vh;
}

input {
  padding: 10px;
  margin: 5px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  background: #8b0000;
  color: white;
  border: none;
  cursor: pointer;
}

#users {
  width: 200px;
  background: #2a000f;
  overflow-y: auto;
}

.user {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #400014;
}

.user:hover {
  background: #400014;
}

#messages {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#msgList {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 5px 0;
}

#inputBox {
  display: flex;
}

#inputBox input {
  flex: 1;
}
</style>
</head>

<body>

<div id="login">
  <h2>VinoChat 🍷</h2>
  <input id="username" placeholder="Usuario">
  <input id="avatar" placeholder="URL foto">
  <button onclick="login()">Entrar</button>
</div>

<div id="chat">
  <div id="users"></div>

  <div id="messages">
    <div id="msgList"></div>
    <div id="inputBox">
      <input id="msgInput" placeholder="Escribe...">
      <button onclick="send()">Enviar</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let currentChat = "global";
let username = localStorage.getItem("username");

if (username) {
  startChat(username, localStorage.getItem("avatar"));
} else {
  document.getElementById("chat").style.display = "none";
}

// LOGIN
function login() {
  let user = document.getElementById("username").value.trim();

  if (!/^[a-zA-Z0-9]+$/.test(user)) {
    alert("Sin espacios ni símbolos");
    return;
  }

  let avatar = document.getElementById("avatar").value;

  localStorage.setItem("username", user);
  localStorage.setItem("avatar", avatar);

  startChat(user, avatar);
}

function startChat(user, avatar) {
  username = user;

  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  socket.emit("login", { username: user, avatar });

  setTimeout(() => {
    document.getElementById("msgInput").focus();
  }, 100);
}

// ENVIAR
function send() {
  let input = document.getElementById("msgInput");
  let text = input.value.trim();

  if (!text) return;

  socket.emit("sendMessage", {
    from: username,
    to: currentChat,
    text
  });

  input.value = "";
}

// ENTER
document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

// RECIBIR
socket.on("newMessage", (msg) => {
  addMessage(msg);
});

socket.on("systemMessage", (msg) => {
  addMessage({ from: "SYSTEM", text: msg.text });
});

// USUARIOS
socket.on("userList", (users) => {
  let container = document.getElementById("users");
  container.innerHTML = "";

  let global = document.createElement("div");
  global.className = "user";
  global.innerText = "🌍 Global";
  global.onclick = () => {
    currentChat = "global";
    document.getElementById("msgList").innerHTML = "";
  };
  container.appendChild(global);

  users.forEach(u => {
    if (u === username) return;

    let div = document.createElement("div");
    div.className = "user";
    div.innerText = u;

    div.onclick = () => {
      currentChat = u;
      document.getElementById("msgList").innerHTML = "";
    };

    container.appendChild(div);
  });
});

// MOSTRAR MENSAJE
function addMessage(msg) {
  if (msg.to && msg.to !== currentChat && msg.from !== username) return;

  let div = document.createElement("div");
  div.className = "msg";
  div.innerText = `${msg.from}: ${msg.text}`;

  let list = document.getElementById("msgList");
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}
</script>

</body>
</html>
