<!DOCTYPE html>
<html>
<head>
  <title>Say Chat 2 💜</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h1>💜 Say Chat 2</h1>
  <input id="user" placeholder="username">
  <input id="nick" placeholder="nickname">
  <input id="pass" type="password" placeholder="password">

  <button onclick="login()">Login</button>
  <button onclick="registro()">Registro</button>
</div>

<!-- 📱 APP -->
<div id="app" style="display:none;">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>Chats</h2>

    <button onclick="irGlobal()">🌍 Global</button>

    <input id="user2" placeholder="username">
    <button onclick="cargarPrivado()">💬 Abrir chat</button>

    <input id="grupo_actual" placeholder="grupo">
    <button onclick="abrirGrupo()">👥 Grupo</button>
  </div>

  <!-- CHAT AREA -->
  <div id="chatArea">

    <!-- HEADER -->
    <div id="chatHeader">
      Say Chat 2
    </div>

    <!-- MENSAJES -->
    <div id="mensajes_global" class="chat"></div>
    <div id="mensajes_privado" class="chat" style="display:none;"></div>
    <div id="mensajes_grupo" class="chat" style="display:none;"></div>

    <!-- INPUT -->
    <div id="inputArea">
      <input id="msg_global" placeholder="Mensaje...">
      <input id="msg_privado" placeholder="Mensaje..." style="display:none;">
      <input id="msg_grupo" placeholder="Mensaje..." style="display:none;">
      <button onclick="enviarActual()">➤</button>
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
