<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VinoChat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1a0008;
  color: white;
}

#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#chat {
  display: none;
  height: 100vh;
}

input {
  padding: 10px;
  margin: 5px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  background: #8b0000;
  color: white;
  border: none;
  cursor: pointer;
}

#users {
  width: 230px;
  background: #2a000f;
  overflow-y: auto;
}

.user {
  display: flex;
  align-items: center;
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #400014;
  position: relative;
}

.user:hover {
  background: #400014;
}

.avatar {
  width: 25px;
  height: 25px;
  background: #555;
  margin-right: 8px;
}

.notification {
  position: absolute;
  right: 10px;
  background: red;
  border-radius: 50%;
  padding: 2px 6px;
  font-size: 12px;
}

#messages {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#msgList {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 5px 0;
}

#inputBox {
  display: flex;
}

#inputBox input {
  flex: 1;
}
</style>
</head>

<body>

<div id="login">
  <h2>VinoChat 🍷</h2>
  <input id="username" placeholder="Usuario">
  <input id="avatar" placeholder="URL foto">
  <button onclick="login()">Entrar</button>
</div>

<div id="chat">
  <div id="users"></div>

  <div id="messages">
    <div id="msgList"></div>
    <div id="inputBox">
      <input id="msgInput" placeholder="Escribe...">
      <button onclick="send()">Enviar</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let currentChat = "global";
let username = localStorage.getItem("username");
let allMessages = { global: [], private: {} };
let notifications = {};
let userData = {};

if (username) {
  startChat(username, localStorage.getItem("avatar"));
}

// LOGIN
function login() {
  let user = document.getElementById("username").value.trim();

  if (!/^[a-zA-Z0-9]+$/.test(user)) {
    alert("Sin espacios ni símbolos");
    return;
  }

  let avatar = document.getElementById("avatar").value;

  localStorage.setItem("username", user);
  localStorage.setItem("avatar", avatar);

  startChat(user, avatar);
}

function startChat(user, avatar) {
  username = user;

  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  socket.emit("login", { username: user, avatar });

  setTimeout(() => {
    document.getElementById("msgInput").focus();
  }, 100);
}

// ENVIAR
function send() {
  let input = document.getElementById("msgInput");
  let text = input.value.trim();
  if (!text) return;

  socket.emit("sendMessage", {
    from: username,
    to: currentChat,
    text
  });

  input.value = "";
}

// ENTER
document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

// CARGA INICIAL
socket.on("loadMessages", (messages) => {
  allMessages = messages;
  renderMessages();
});

// NUEVO MENSAJE
socket.on("newMessage", (msg) => {
  if (msg.to === "global") {
    allMessages.global.push(msg);
  } else {
    const key = [msg.from, msg.to].sort().join("-");
    if (!allMessages.private[key]) allMessages.private[key] = [];
    allMessages.private[key].push(msg);
  }

  if (msg.from !== username && msg.to !== currentChat) {
    notifications[msg.from] = (notifications[msg.from] || 0) + 1;
  }

  renderUsers();
  renderMessages();
});

// USUARIOS
socket.on("userList", (data) => {
  userData = data.allUsers || {};
  renderUsers(data.users);
});

function renderUsers(users = []) {
  let container = document.getElementById("users");
  container.innerHTML = "";

  let global = createUser("global", "🌍 Global", "");
  container.appendChild(global);

  users.forEach(u => {
    if (u === username) return;
    let avatar = userData[u]?.avatar || "";
    let el = createUser(u, u, avatar);
    container.appendChild(el);
  });
}

function createUser(id, name, avatarUrl) {
  let div = document.createElement("div");
  div.className = "user";

  div.onclick = () => {
    currentChat = id;
    notifications[id] = 0;
    renderUsers();
    renderMessages();
  };

  let avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = avatarUrl || "";
  div.appendChild(avatar);

  let text = document.createElement("span");
  text.innerText = name;
  div.appendChild(text);

  if (notifications[id]) {
    let notif = document.createElement("div");
    notif.className = "notification";
    notif.innerText = notifications[id];
    div.appendChild(notif);
  }

  return div;
}

// MENSAJES
function renderMessages() {
  let list = document.getElementById("msgList");
  list.innerHTML = "";

  let msgs = [];

  if (currentChat === "global") {
    msgs = allMessages.global;
  } else {
    const key = [username, currentChat].sort().join("-");
    msgs = allMessages.private[key] || [];
  }

  msgs.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = `${m.from}: ${m.text}`;
    list.appendChild(div);
  });

  list.scrollTop = list.scrollHeight;
}
</script>

</body>
</html>
